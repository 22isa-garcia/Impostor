<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>IMPOSTOR</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://pyscript.net/releases/2026.2.1/core.css"/>
  <script type="module" src="https://pyscript.net/releases/2026.2.1/core.js"></script>
</head>

<body>
  <br><br>
  <center><h2 id="info_nom">Jugador</h2></center>
  <center><h1 id="info_rol">ROL</h1></center>
  <center><h3 id="info_pista">PISTA:...</h3></center>
  <br>
  <center> 
    <button mpy-click="seguent" class="setè-boto">SEGÜENT</button>  
  </center>

  <script type="mpy">
    import js
    import json
    from pyscript import document

    def revelar_rol():
        torn = int(js.sessionStorage.getItem("torn_actual"))
        dades_partida = json.loads(js.sessionStorage.getItem("dades_partida"))
        
        jugador_actual = dades_partida[torn]
        
        document.getElementById("info_nom").innerText = jugador_actual["nom"]
        
        if jugador_actual["rol"] == "Impostor":
            document.getElementById("info_rol").innerText = "ETS L'IMPOSTOR "
            document.getElementById("info_pista").innerText = f"La teva pista és: {jugador_actual['text']}"
        else:
            document.getElementById("info_rol").innerText = "NO ETS L'IMPOSTOR"
            document.getElementById("info_pista").innerText = f"La paraula és: {jugador_actual['text']}"

    def seguent(event):
        torn = int(js.sessionStorage.getItem("torn_actual"))
        dades_partida = json.loads(js.sessionStorage.getItem("dades_partida"))
        
        torn = torn + 1
        js.sessionStorage.setItem("torn_actual", str(torn))
        
        if torn < len(dades_partida):
            js.window.location.href = "jugador.html"
        else:
            js.sessionStorage.setItem("torn_actual", "0")

            js.window.location.href = "moment_de_jugar.html"

    revelar_rol()
  </script>
</body>
</html>
