        <script type="mpy">
            from pyscript import display

            def wallis(n):
                pi = 2
                for i in range(1, n):
                    pi *= 4 * i ** 2 / (4 * i ** 2 - 1)
                return pi
            
            def calcul_amb_pista(event):
                s = f"tens pista"
                display(s, target="num_jugadors", append=False)  

            
            def calcul_sense_pista(event):
                s = f"no tens pista"
                display(s, target="num_jugadors", append=False)
            
            def menys_un_jugador(event):
                s = f"n_impostors-1"
                display(s, target="num_jugadors", append=False) 

            def mes_un_jugador(event):
                s = f"n_impostors+1"
                display(s, target="num_jugadors", append=False)
                

            def jugadors_py(event):

                display(s, target="n_jugadors", append=False)
